<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="Styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <title>Portfolio</title>
</head>
<body>
    <header class="header">
        <a href="#" class="logo"><span>Lukáš Nedbal</span></a>
        <ul class="nav-links">   
            <li><a href="#about">About</a></li>
            <li><a href="#projects">Projects</a></li>
            <li><a href="#experience">Experience</a></li>
            <li><a href="#contact">Contact</a></li>
        </ul>
        <i class="fa-solid fa-bars" id="menu-icon"></i>
        <button class="visit-btn">Visit Github</button>
    </header>

    <section id="about" class="about">
        <div class="about-container">
            <img src="IMG/image-removebg-preview (11).png" alt="img">
            <div class="info-box">
                <div class="text">
                    <h3>Hi, I'm</h3>
                    <h1 id="animated-name">
                        <span>L</span><span>u</span><span>k</span><span>á</span><span>š</span>
                        <span>N</span><span>e</span><span>d</span><span>b</span><span>a</span><span>l</span>
                    </h1>
                    <span>Frontend Developer</span>
                </div>
                <div class="btn-group">
                    <div class="btn">Download CV</div>
                    <div class="btn">Contact</div>
                </div>
                <div class="socials">
                    <i class="fa-brands fa-github"></i>
                    <i class="fa-brands fa-linkedin"></i>
                </div>
            </div>
        </div>
    </section>

    <section class="horizontal-scroll">
        <div class="horizontal-content">
            <img class="box" src="Scroll/Mísnost.png" alt="Image 1">
            <img class="box" src="Scroll/Pizza.png" alt="Image 2">
            <img class="box" src="Scroll/Pokoj.png" alt="Image 3">
            <img class="box" src="Scroll/REKLAMA.png" alt="Image 4">
        </div>
    </section>

    <script src="script.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script>
        
        window.onload = function() {
            gsap.from("#animated-name span", {
                y: 100,
                opacity: 0,
                stagger: 0.1,
                duration: 1,
                ease: "power3.out"
            });
        };

        
        gsap.registerPlugin(ScrollTrigger);
        gsap.to(".horizontal-content", {
            xPercent: -100 * (document.querySelectorAll(".box").length - 1),
            ease: "none",
            scrollTrigger: {
                trigger: ".horizontal-scroll",
                pin: true,
                scrub: 1,
                snap: 1 / (document.querySelectorAll(".box").length - 1),
                end: "+=3000",
            }
        });
    </script>
</body>
</html>
